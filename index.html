<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 设计走查工具</title>
    <style>
      :root {
        --primary: #1677ff;
        --danger: #ff4d4f;
        --warning: #fa8c16;
        --low: #faad14;
        --text: #1f2329;
        --sub-text: #5c6470;
        --bg: #f5f7fb;
        --card: #ffffff;
        --border: #e7ebf0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .container {
        width: min(1100px, 92vw);
        margin: 28px auto 40px;
      }

      .title {
        margin: 0 0 18px;
        font-size: 28px;
        font-weight: 700;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 6px 20px rgba(15, 42, 79, 0.05);
      }

      .upload-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(240px, 1fr));
        gap: 14px;
        margin-bottom: 14px;
      }

      .upload-box {
        border: 1px dashed #bdd5ff;
        border-radius: 12px;
        padding: 12px;
        background: #f8fbff;
      }

      .upload-box h3 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .preview {
        margin-top: 10px;
        width: 100%;
        max-height: 280px;
        object-fit: contain;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        display: none;
      }

      .action-row {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
      }

      .btn {
        border: 0;
        background: var(--primary);
        color: #fff;
        border-radius: 10px;
        padding: 11px 16px;
        font-size: 14px;
        cursor: pointer;
        min-width: 110px;
      }

      .btn-inner {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .btn:disabled {
        background: #94bfff;
        cursor: not-allowed;
      }

      .status {
        margin-top: 10px;
        min-height: 22px;
        color: var(--sub-text);
        font-size: 14px;
      }

      .error {
        margin-top: 10px;
        white-space: pre-wrap;
        font-size: 13px;
        color: #9f1d1f;
        background: #fff2f0;
        border: 1px solid #ffccc7;
        border-radius: 8px;
        padding: 10px;
        display: none;
      }

      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid #d7e7ff;
        border-top-color: var(--primary);
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: -2px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .result {
        margin-top: 16px;
        opacity: 1;
        transition: opacity 0.3s ease;
      }

      .result.is-dimmed {
        opacity: 0.45;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(2, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .summary-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      .summary-label {
        font-size: 13px;
        color: var(--sub-text);
      }

      .summary-value {
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
      }

      .issues {
        display: grid;
        gap: 12px;
      }

      .issue-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px;
      }

      .issue-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .badge {
        background: var(--primary);
        color: #fff;
        border-radius: 999px;
        min-width: 28px;
        text-align: center;
        padding: 3px 9px;
        font-size: 12px;
        font-weight: 600;
      }

      .tag {
        border-radius: 999px;
        font-size: 12px;
        padding: 3px 9px;
        font-weight: 600;
      }

      .tag-type {
        background: #eaf2ff;
        color: #1454b8;
      }

      .issue-title {
        font-size: 16px;
        font-weight: 700;
        margin: 6px 0 8px;
      }

      .meta-line,
      .desc-line {
        font-size: 14px;
        line-height: 1.6;
        color: #2f3640;
      }

      .meta-line strong,
      .desc-line strong {
        color: #111;
      }

      .loading-panel {
        margin-top: 16px;
        width: 100%;
        background: #ffffff;
        border: 1px solid #dbe7ff;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(22, 119, 255, 0.12);
        padding: 24px 16px;
        display: none;
        text-align: center;
      }

      .loading-panel.active {
        display: block;
      }

      .loading-spinner-lg {
        width: 36px;
        height: 36px;
        border: 4px solid #d8e9ff;
        border-top-color: var(--primary);
        border-radius: 50%;
        margin: 0 auto 14px;
        animation: spin 0.9s linear infinite;
      }

      .loading-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .loading-subtitle {
        font-size: 14px;
        color: var(--sub-text);
        margin-bottom: 12px;
      }

      .loading-step {
        display: inline-block;
        border-radius: 999px;
        background: #eef5ff;
        color: #1454b8;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
      }

      .error-card {
        margin-top: 16px;
        background: #fff2f0;
        border: 1px solid #ffccc7;
        border-radius: 12px;
        box-shadow: 0 6px 16px rgba(255, 77, 79, 0.08);
        padding: 14px;
        display: none;
      }

      .error-card-title {
        color: #cf1322;
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      .error-card-body {
        color: #9f1d1f;
        font-size: 13px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">AI 设计走查工具</h1>

      <section class="panel">
        <div class="upload-grid">
          <div class="upload-box">
            <h3>图 A：设计稿</h3>
            <input id="designInput" type="file" accept="image/*" />
            <img id="designPreview" class="preview" alt="设计稿预览" />
          </div>
          <div class="upload-box">
            <h3>图 B：实现稿</h3>
            <input id="actualInput" type="file" accept="image/*" />
            <img id="actualPreview" class="preview" alt="实现稿预览" />
          </div>
        </div>

        <div class="action-row">
          <button id="startBtn" class="btn" type="button" disabled>开始走查</button>
        </div>

        <div id="statusText" class="status">请先上传设计稿与实现稿，然后点击「开始走查」。</div>
        <div id="errorBox" class="error"></div>
      </section>

      <section class="result">
        <div id="loadingPanel" class="loading-panel">
          <div class="loading-spinner-lg"></div>
          <div class="loading-title">AI 正在分析两张图...</div>
          <div class="loading-subtitle">通常需要 10-30 秒，请耐心等待</div>
          <div id="loadingStep" class="loading-step">正在上传图片...</div>
        </div>

        <div id="errorCard" class="error-card">
          <div class="error-card-title">走查失败</div>
          <div id="errorCardBody" class="error-card-body"></div>
        </div>

        <div class="summary">
          <div class="summary-card">
            <div class="summary-label">总差异数</div>
            <div id="totalIssues" class="summary-value">-</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">一致性评分</div>
            <div id="score" class="summary-value">-</div>
          </div>
        </div>
        <div id="issuesList" class="issues"></div>
      </section>
    </div>

    <script>
      const designInput = document.getElementById("designInput");
      const actualInput = document.getElementById("actualInput");
      const designPreview = document.getElementById("designPreview");
      const actualPreview = document.getElementById("actualPreview");
      const startBtn = document.getElementById("startBtn");
      const statusText = document.getElementById("statusText");
      const errorBox = document.getElementById("errorBox");
      const totalIssues = document.getElementById("totalIssues");
      const score = document.getElementById("score");
      const issuesList = document.getElementById("issuesList");
      const loadingPanel = document.getElementById("loadingPanel");
      const loadingStep = document.getElementById("loadingStep");
      const resultSection = document.querySelector(".result");
      const errorCard = document.getElementById("errorCard");
      const errorCardBody = document.getElementById("errorCardBody");

      let designFile = null;
      let actualFile = null;
      let loadingStepTimer = null;
      let loadingStepIndex = 0;

      const LOADING_STEPS = [
        "正在上传图片...",
        "AI 正在识别元素...",
        "正在对比差异...",
        "生成报告中...",
      ];

      // 仅在两张图都已选择时启用「开始走查」，避免点了才提示缺图
      function updateUploadState() {
        const ready = !!(designFile && actualFile);
        if (!loadingPanel.classList.contains("active")) {
          startBtn.disabled = !ready;
        }
      }

      // 文件选择后更新预览图，并把 File 保存在内存变量中
      function handleFileChange(inputEl, previewEl, kind) {
        const file = inputEl.files[0];
        if (!file) return;
        if (!file.type.startsWith("image/")) {
          showError(`请选择图片文件（${kind}）。`);
          return;
        }
        clearError();
        const objectUrl = URL.createObjectURL(file);
        previewEl.src = objectUrl;
        previewEl.style.display = "block";
        if (kind === "设计稿") designFile = file;
        if (kind === "实现稿") actualFile = file;
        updateUploadState();
      }

      designInput.addEventListener("change", () =>
        handleFileChange(designInput, designPreview, "设计稿")
      );
      actualInput.addEventListener("change", () =>
        handleFileChange(actualInput, actualPreview, "实现稿")
      );

      startBtn.addEventListener("click", async () => {
        if (!designFile || !actualFile) {
          showError("请先上传设计稿和实现稿。");
          return;
        }

        clearError();
        clearErrorCard();
        setLoading(true, "正在通过服务器分析差异，请稍候...");
        try {
          // 1) 将两张图转成 base64 + mime（只发给自家后端，不暴露 Key）
          const [designImg, actualImg] = await Promise.all([
            fileToBase64(designFile),
            fileToBase64(actualFile),
          ]);

          const payload = {
            designMimeType: designImg.mimeType,
            designBase64: designImg.base64,
            actualMimeType: actualImg.mimeType,
            actualBase64: actualImg.base64,
          };

          // 2) 调用 Vercel 上的 /api/analyze，由后端代调 Gemini
          const resp = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          // 先读成文本再 JSON.parse，避免失败时无法读取错误详情
          const responseText = await resp.text();
          let data = null;
          try {
            data = responseText ? JSON.parse(responseText) : null;
          } catch {
            data = null;
          }

          if (!resp.ok) {
            const msg =
              data && typeof data.error === "string" ? data.error : `HTTP ${resp.status}`;
            const details =
              data && typeof data.details === "string" && data.details
                ? data.details
                : responseText;
            throw new Error(details && details !== "{}" ? `${msg}\n${details}` : msg);
          }

          if (!data || typeof data.rawText !== "string") {
            throw new Error("服务器返回格式异常：缺少 rawText。");
          }

          // 3) 与直连 Gemini 时相同：解析外层响应里的模型 JSON
          const parsed = parseGeminiResponse(data.rawText);
          renderReport(parsed);
          setLoading(false, "走查完成。");
          // 结果生成后平滑滚动到结果区域，提升交互体验
          resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
        } catch (err) {
          setLoading(false, "走查失败。");
          showError(`调用失败：${err.message}`);
          showErrorCard(`调用失败：${err.message}`);
        }
      });

      function setLoading(loading, text) {
        startBtn.disabled = loading;
        if (loading) {
          startBtn.innerHTML =
            '<span class="btn-inner"><span class="btn-spinner"></span>AI 走查中...</span>';
          statusText.innerHTML = `<span class="spinner"></span>${escapeHtml(text)}`;
          resultSection.classList.add("is-dimmed");
          loadingPanel.classList.add("active");
          startLoadingSteps();
        } else {
          startBtn.textContent = "开始走查";
          statusText.textContent = text;
          resultSection.classList.remove("is-dimmed");
          loadingPanel.classList.remove("active");
          stopLoadingSteps();
          updateUploadState();
        }
      }

      // 让动态进度文字每 3 秒轮播一次
      function startLoadingSteps() {
        stopLoadingSteps();
        loadingStepIndex = 0;
        loadingStep.textContent = LOADING_STEPS[loadingStepIndex];
        loadingStepTimer = window.setInterval(() => {
          loadingStepIndex = (loadingStepIndex + 1) % LOADING_STEPS.length;
          loadingStep.textContent = LOADING_STEPS[loadingStepIndex];
        }, 3000);
      }

      function stopLoadingSteps() {
        if (loadingStepTimer !== null) {
          window.clearInterval(loadingStepTimer);
          loadingStepTimer = null;
        }
      }

      function showError(msg) {
        errorBox.style.display = "block";
        errorBox.textContent = msg;
      }

      function clearError() {
        errorBox.style.display = "none";
        errorBox.textContent = "";
      }

      function showErrorCard(msg) {
        errorCard.style.display = "block";
        errorCardBody.textContent = msg;
      }

      function clearErrorCard() {
        errorCard.style.display = "none";
        errorCardBody.textContent = "";
      }

      // 将图片文件转为 base64（去掉 data:image/...;base64, 前缀）
      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const result = String(reader.result || "");
            const commaIndex = result.indexOf(",");
            if (commaIndex === -1) {
              reject(new Error("图片编码失败，未找到 base64 数据。"));
              return;
            }
            resolve({
              mimeType: file.type || "image/png",
              base64: result.slice(commaIndex + 1),
            });
          };
          reader.onerror = () => reject(new Error("读取图片失败。"));
          reader.readAsDataURL(file);
        });
      }

      // 兼容 Gemini 外层响应，并提取 text 字段中的 JSON
      function parseGeminiResponse(rawText) {
        let outer;
        try {
          outer = JSON.parse(rawText);
        } catch (e) {
          throw new Error(`返回不是合法 JSON：\n${rawText}`);
        }

        const modelText =
          outer?.candidates?.[0]?.content?.parts?.find((p) => p.text)?.text || "";
        if (!modelText) {
          throw new Error(`未拿到模型文本内容：\n${rawText}`);
        }

        const cleanText = modelText
          .replace(/^```json\s*/i, "")
          .replace(/^```\s*/i, "")
          .replace(/\s*```$/i, "")
          .trim();

        let report;
        try {
          report = JSON.parse(cleanText);
        } catch (e) {
          throw new Error(`模型返回内容不是目标 JSON：\n${modelText}`);
        }

        if (!report.summary || !Array.isArray(report.issues)) {
          throw new Error(`JSON 缺少 summary 或 issues：\n${cleanText}`);
        }

        return report;
      }

      function renderReport(report) {
        const issueCount = Number(report.summary.total_issues ?? report.issues.length ?? 0);
        const scoreValue = Number(report.summary.consistency_score ?? 0);
        totalIssues.textContent = Number.isFinite(issueCount) ? String(issueCount) : "-";
        score.textContent = Number.isFinite(scoreValue) ? scoreValue.toFixed(2) : "-";

        issuesList.innerHTML = "";
        if (!report.issues.length) {
          const card = document.createElement("div");
          card.className = "issue-card";
          card.textContent = "没有发现明显差异。";
          issuesList.appendChild(card);
          return;
        }

        report.issues.slice(0, 10).forEach((item, idx) => {
          const card = document.createElement("article");
          card.className = "issue-card";

          const sevColor = getSeverityColor(item.severity);
          card.innerHTML = `
            <div class="issue-head">
              <span class="badge">#${escapeHtml(String(item.id ?? idx + 1))}</span>
              <span class="tag" style="background:${sevColor.bg};color:${sevColor.text};">严重度：${escapeHtml(
            String(item.severity || "-")
          )}</span>
              <span class="tag tag-type">${escapeHtml(String(item.type || "其他"))}</span>
            </div>
            <div class="issue-title">${escapeHtml(String(item.title || "未命名问题"))}</div>
            <div class="meta-line"><strong>位置：</strong>${escapeHtml(String(item.location || "-"))}</div>
            <div class="desc-line"><strong>差异描述：</strong>${escapeHtml(
              String(item.description || "-")
            )}</div>
            <div class="desc-line"><strong>设计稿值：</strong>${escapeHtml(
              String(item.design_value || "-")
            )}</div>
            <div class="desc-line"><strong>实现稿值：</strong>${escapeHtml(
              String(item.actual_value || "-")
            )}</div>
            <div class="desc-line"><strong>修复建议：</strong>${escapeHtml(
              String(item.suggestion || "-")
            )}</div>
          `;

          issuesList.appendChild(card);
        });
      }

      function getSeverityColor(severity) {
        if (severity === "高") {
          return { bg: "#fff1f0", text: "#ff4d4f" };
        }
        if (severity === "中") {
          return { bg: "#fff7e8", text: "#fa8c16" };
        }
        return { bg: "#fffbe6", text: "#faad14" };
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      updateUploadState();
    </script>
  </body>
</html>
